name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Build with Gradle
      working-directory: ./ResWays-Android
      run: gradle assembleDebug > build_log.txt 2>&1 || true

    - name: Commit build log
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git pull origin main
        mv ./ResWays-Android/build_log.txt ./build_log.txt
        git add build_log.txt
        git commit -m "Upload build log"
        git push origin HEAD:main

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ResWays-MVP-APK
        path: ResWays-Android/app/build/outputs/apk/debug/app-debug.apk
